{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} — {{end}}Latasya ERP</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/htmx.min.js"></script>
    <style>
        /* Native cross-document view transitions (Chrome/Edge/Safari) */
        @view-transition { navigation: auto; }

        /* HTMX loading indicator */
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
        /* Top loading bar */
        #page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: var(--color-primary); z-index: 9999; }
        /* Full-page navigation loader (non-HTMX link clicks, form submits) */
        body.is-navigating #page-loader { opacity: 1; animation: page-loader-pulse 900ms ease-in-out infinite; }
        @keyframes page-loader-pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen bg-base-200"
    {{if .CSRFToken}}hx-headers='{"X-CSRF-Token": "{{.CSRFToken}}"}'{{end}}>
    <!-- Global loading bar (shown during any HTMX request) -->
    <div id="page-loader" class="htmx-indicator"></div>

    {{if .User}}
    <div class="drawer lg:drawer-open" hx-indicator="#page-loader">
        <input id="sidebar-toggle" type="checkbox" class="drawer-toggle">
        <div class="drawer-content flex flex-col">
            {{template "nav" .}}
            <main class="flex-1 p-4 lg:p-6">
                {{template "flash" .}}
                {{block "content" .}}{{end}}
            </main>
        </div>
        <div class="drawer-side">
            <label for="sidebar-toggle" class="drawer-overlay"></label>
            {{template "sidebar" .}}
        </div>
    </div>
    {{else}}
    <main class="min-h-screen flex items-center justify-center bg-base-200">
        {{block "content" .}}{{end}}
    </main>
    {{end}}

    <script>
    // HTMX error handling — show alert on network/server errors
    document.body.addEventListener('htmx:responseError', function(e) {
        var status = e.detail.xhr.status;
        if (status === 403) {
            alert('Access denied. Admin privileges required.');
        } else if (status >= 500) {
            alert('Server error. Please try again.');
        }
    });
    document.body.addEventListener('htmx:sendError', function() {
        alert('Network error. Please check your connection.');
    });

    // Show the top loading bar during full-page navigations (link clicks,
    // form submits, back/forward). HTMX requests already use #page-loader
    // via hx-indicator.
    window.addEventListener('beforeunload', function() {
        document.body.classList.add('is-navigating');
    });
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) document.body.classList.remove('is-navigating');
    });
    </script>
</body>
</html>
{{end}}

{{template "base" .}}
{{define "content"}}
<div class="card w-full max-w-sm bg-base-100 shadow-xl">
    <div class="card-body">
        <h2 class="card-title text-2xl font-bold text-center justify-center mb-2">Latasya ERP</h2>
        <p class="text-center text-sm opacity-60 mb-4">Sign in to your account</p>

        {{if .Data}}
        {{with .Data}}
        {{if index . "Error"}}
        <div class="alert alert-error mb-4">
            <span>{{index . "Error"}}</span>
        </div>
        {{end}}
        {{end}}
        {{end}}

        <form method="POST" action="/login">
            <div class="form-control mb-4">
                <label class="label" for="username">
                    <span class="label-text">Username</span>
                </label>
                <input type="text" id="username" name="username" placeholder="Username"
                    class="input input-bordered w-full"
                    value="{{if .Data}}{{index .Data "Username"}}{{end}}"
                    required autofocus>
            </div>
            <div class="form-control mb-6">
                <label class="label" for="password">
                    <span class="label-text">Password</span>
                </label>
                <input type="password" id="password" name="password" placeholder="Password"
                    class="input input-bordered w-full" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </form>
    </div>
</div>
{{end}}

{{define "invoice-line"}}
<tr>
    <td>
        <input type="text" name="line_description" placeholder="Description"
            class="input input-sm w-full">
    </td>
    <td>
        <select name="line_account_id" class="select select-sm w-full">
            <option value="">Account</option>
            {{range .Accounts}}
            <option value="{{.ID}}">{{.Code}} - {{.Name}}</option>
            {{end}}
        </select>
    </td>
    <td>
        <input type="number" name="line_quantity" class="input input-sm w-full" value="1" step="0.01" min="0">
    </td>
    <td>
        <input type="number" name="line_unit_price" placeholder="0" class="input input-sm w-full font-mono" min="0">
    </td>
    <td class="font-mono text-sm line-amount">0</td>
    <td>
        <button type="button" class="btn btn-ghost btn-xs text-error" onclick="removeInvLine(this)">X</button>
    </td>
</tr>
{{end}}

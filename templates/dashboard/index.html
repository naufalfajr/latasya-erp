{{template "base" .}}
{{define "content"}}
<h1 class="text-2xl font-bold mb-6">Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="stat bg-base-100 rounded-box shadow">
        <div class="stat-title">Cash Balance</div>
        <div class="stat-value text-lg">Rp 0</div>
    </div>
    <div class="stat bg-base-100 rounded-box shadow">
        <div class="stat-title">Monthly Revenue</div>
        <div class="stat-value text-lg text-success">Rp 0</div>
    </div>
    <div class="stat bg-base-100 rounded-box shadow">
        <div class="stat-title">Monthly Expenses</div>
        <div class="stat-value text-lg text-error">Rp 0</div>
    </div>
    <div class="stat bg-base-100 rounded-box shadow">
        <div class="stat-title">Outstanding Invoices</div>
        <div class="stat-value text-lg text-warning">0</div>
    </div>
</div>

<div class="card bg-base-100 shadow">
    <div class="card-body">
        <h2 class="card-title">Recent Transactions</h2>
        <p class="text-sm opacity-60">No transactions yet. Start by recording income or expenses.</p>
    </div>
</div>
{{end}}

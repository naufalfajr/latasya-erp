<div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
        <h2 class="card-title text-2xl font-bold justify-center mb-2">Token Created</h2>
        
        <div class="alert alert-warning mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-info shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span>This is the ONLY time you'll see this token. Save it now!</span>
        </div>

        <p class="text-center text-sm opacity-60 mb-4">Your new API token has been created.</p>

        <div class="form-control mb-6">
            <label class="label" for="token">
                <span class="label-text">Token</span>
            </label>
            <div class="relative">
                <input type="text" id="token" readonly value="{{$data.Token}}"
                       class="input input-bordered font-mono text-sm">
                <button type="button" class="btn btn-square absolute right-1 top-1/2 -translate-y-1/2"
                        onclick="navigator.clipboard.writeText('{{$data.Token}}').then(() => { document.getElementById('copy-success').classList.remove('hidden'); })"
                        aria-label="Copy to clipboard">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </button>
            </div>
            <div id="copy-success" class="alert alert-success mt-2 hidden">
                <span>Copied to clipboard!</span>
            </div>
        </div>

        <div class="card-actions justify-end">
            <a href="/settings/api-tokens" class="btn btn-primary">Done</a>
        </div>
    </div>
</div>

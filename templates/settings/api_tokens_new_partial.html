<div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
        <h2 class="card-title text-2xl font-bold justify-center mb-2">Create API Token</h2>
        <p class="text-center text-sm opacity-60 mb-4">Create a new API token for bots or integrations.</p>

        {{if $data.Errors.general}}
        <div class="alert alert-error mb-4"><span>{{$data.Errors.general}}</span></div>
        {{end}}

        <form method="POST" action="/settings/api-tokens">
            {{template "csrf" $}}
            
            <div class="form-control mb-4">
                <label class="label" for="name">
                    <span class="label-text">Name</span>
                </label>
                <input type="text" id="name" name="name" class="input input-bordered" 
                       placeholder="e.g., Telegram Bot" required autofocus>
            </div>

            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text">Scopes</span>
                </label>
                <div class="grid grid-cols-2 gap-2">
                    {{range $data.AvailableScopes}}
                    <label class="label cursor-pointer justify-start gap-2">
                        <input type="checkbox" name="scopes" value="{{.}}" class="checkbox checkbox-sm">
                        <span class="label-text text-xs">{{.}}</span>
                    </label>
                    {{end}}
                </div>
                {{if $data.Errors.scopes}}
                <label class="label">
                    <span class="label-text-alt text-error">{{$data.Errors.scopes}}</span>
                </label>
                {{end}}
            </div>

            {{if $data.Errors.expires_at}}
            <label class="label">
                <span class="label-text-alt text-error">{{$data.Errors.expires_at}}</span>
            </label>
            {{end}}

            <div class="form-control mb-6">
                <label class="label" for="expires_at">
                    <span class="label-text">Expires (optional)</span>
                </label>
                <input type="date" id="expires_at" name="expires_at" class="input input-bordered">
            </div>

            <div class="card-actions justify-end">
                <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal-container').innerHTML = ''">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Token</button>
            </div>
        </form>
    </div>
</div>

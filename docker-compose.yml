services:
  latasya-erp:
    build: .
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/latasya.db
      - PORT=8080
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - latasya-erp
    restart: unless-stopped

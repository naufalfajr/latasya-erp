name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true

      - name: Download Tailwind CLI and daisyUI
        env:
          TAILWIND_VERSION: v4.3.3
          DAISYUI_VERSION: v5.6.18
        run: |
          mkdir -p bin
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64 -o bin/tailwindcss
          chmod +x bin/tailwindcss
          curl -sL https://github.com/saadeghi/daisyui/releases/download/${DAISYUI_VERSION}/daisyui.mjs -o bin/daisyui.mjs
          curl -sL https://github.com/saadeghi/daisyui/releases/download/${DAISYUI_VERSION}/daisyui-theme.mjs -o bin/daisyui-theme.mjs

      - name: Build CSS
        run: ./bin/tailwindcss -i static/css/input.css -o static/css/app.css --minify

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-X main.version=${GITHUB_SHA}" \
            -o latasya-erp ./cmd/server

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ship binary
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -o BatchMode=yes -o ConnectTimeout=15 \
            -i ~/.ssh/deploy_key latasya-erp "$VPS_USER@$VPS_HOST:/tmp/latasya-erp"

      - name: Install and restart
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=15 \
            -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            'sudo install -m 755 /tmp/latasya-erp /usr/local/bin/latasya-erp && sudo systemctl restart latasya-erp'

      - name: Verify service is healthy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=15 \
            -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "EXPECTED_SHA=$EXPECTED_SHA bash -s" <<'EOF'
          set -euo pipefail

          # Wait for systemd to settle after restart.
          for i in {1..10}; do
            if systemctl is-active --quiet latasya-erp; then break; fi
            sleep 1
          done

          # Unit must be running — catches startup panics cleanly before curl.
          sudo systemctl is-active --quiet latasya-erp

          # Ask the app itself: are you the right build?
          body=$(curl -sSf http://127.0.0.1:8080/healthz)
          echo "healthz: $body"

          if ! echo "$body" | grep -q "version=$EXPECTED_SHA"; then
            echo "FAIL: serving binary does not match $EXPECTED_SHA"
            sudo journalctl -u latasya-erp -n 50 --no-pager
            exit 1
          fi

          echo "deploy verified: correct build ($EXPECTED_SHA) is live"
          EOF

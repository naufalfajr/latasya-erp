  /api-tokens:
    get:
      operationId: listAPITokens
      summary: List current user's API tokens
      responses:
        '200':
          description: List of API tokens (never includes plaintext)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAPIToken
      summary: Create a new API token (cookie auth only)
      description: |
        Creates a scoped Bearer token for bot/MCP/Telegram integrations.
        The plaintext token is returned ONCE in this response only.
        Bearer-authenticated requests are rejected (tokens cannot create tokens).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APITokenInput'
      responses:
        '201':
          description: Token created (plaintext shown once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/APITokenCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':

          $ref: '#/components/responses/Conflict'
  /openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: Get OpenAPI specification
      description: Returns the raw OpenAPI 3.1 YAML specification.
      security: []
      responses:
        '200':
          description: OpenAPI YAML specification.
          content:
            application/yaml:
              schema:
                type: string

  /auth/login:
    post:
      operationId: login
      summary: Authenticate and create a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [user, csrf_token]
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      csrf_token:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      operationId: logout
      summary: Destroy the current session
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'


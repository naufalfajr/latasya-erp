openapi: 3.1.0
info:
  title: Latasya ERP API
  version: 1.0.0
  description: |
    JSON API for Latasya ERP — a bookkeeping web app for Indonesian transport businesses.
    
    ## Authentication
    
    Two authentication methods are supported:
    
    - **Cookie + CSRF**: For browser clients. Session cookie `session_id` + `X-CSRF-Token` header.
    - **Bearer Token**: For bots, MCP servers, Telegram integrations. `Authorization: Bearer lat_<token>`.
      Bearer tokens are scoped (subset of user capabilities) and revocable.
      Bearer requests skip CSRF validation.
    
    ## Money & Quantities
    
    - **Currency (IDR)**: All monetary amounts are strings representing integer IDR values.
      Example: `"50000"` = Rp 50.000. No decimals, no subunits.
    - **Quantities**: Decimal strings with up to 2 decimal places.
      Example: `"1.50"` = 1.5 units (stored internally as integer × 100).
    
    ## Pagination
    
    List endpoints return: `{"data": [...], "meta": {"page": 1, "per_page": 50, "total": 100, "total_pages": 2}}`
    
    Query params: `?page=1&per_page=50` (default 50, max 200).
    
    ## Errors
    
    All errors return: `{"error": "message", "code": "snake_case_code", "request_id": "...", "fields": {...}}`
    
    Common codes: `unauthorized`, `forbidden`, `not_found`, `validation_failed`, `conflict`, `rate_limited`, `invalid_token`.

servers:
  - url: /api/v1
    description: Latasya ERP API v1

security:
  - BearerAuth: []
  - CookieAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token created via /settings/api-tokens or POST /api/v1/api-tokens.
        Format: `lat_<32-base62-chars>`. Scoped to a subset of user capabilities.
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Session cookie set on login. Requires X-CSRF-Token header for state-changing requests.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: |
        Unique key for idempotent requests. If the same key is used within 24 hours,
        the original response is replayed without re-executing the operation.
        Required for financial mutations (invoices, bills, journals, credit-notes).
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  schemas:
    IDR:
      type: string
      pattern: '^-?[0-9]+$'
      description: |
        Indonesian Rupiah amount as integer-valued string.
        Example: "50000" = Rp 50.000. No decimals, no subunits.
      example: "50000"

    Quantity:
      type: string
      pattern: '^[0-9]+(\.[0-9]{1,2})?$'
      description: |
        Quantity as decimal string with up to 2 decimal places.
        Stored internally as integer × 100.
        Example: "1.50" = 1.5 units.
      example: "1.50"

    BusinessDate:
      type: string
      format: date
      description: Business date in YYYY-MM-DD format (Asia/Jakarta timezone context).
      example: "2026-05-10"

    Instant:
      type: string
      format: date-time
      description: UTC timestamp in ISO-8601 format.
      example: "2026-05-10T03:00:00Z"

    User:
      type: object
      required: [id, username, full_name, role, capabilities, must_change_password]
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        must_change_password:
          type: boolean

    AuthMe:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [auth_method]
          properties:
            auth_method:
              type: string
              enum: [bearer, cookie]
            token_id:
              type: integer
              nullable: true

    Account:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        normal_balance:
          type: string
          enum: [debit, credit]
        description:
          type: string
        is_active:
          type: boolean
        is_system:
          type: boolean
        parent_id:
          type: integer
          nullable: true
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    AccountInput:
      type: object
      required: [code, name, account_type, normal_balance]
      properties:
        code:
          type: string
        name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        normal_balance:
          type: string
          enum: [debit, credit]
        description:
          type: string
        is_active:
          type: boolean
          default: true

    Meta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 50
        total:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 2

    ErrorEnvelope:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: "not authenticated"
        code:
          type: string
          description: Machine-readable error code.
          enum:
            - invalid_request
            - validation_failed
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - rate_limited
            - invalid_token
            - password_change_required
            - idempotency_conflict
            - internal_error
          example: "unauthorized"
        request_id:
          type: string
          description: Request ID for tracing (from audit middleware).
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
        fields:
          type: object
          additionalProperties:
            type: string
          description: Field-level validation errors (only present for validation_failed).
          example:
            contact_id: "required"
            amount: "must be positive"

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contact_type:
          type: string
          enum: [customer, supplier, both]
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    JournalLine:
      type: object
      required: [account_id, debit, credit]
      properties:
        id:
          type: integer
        entry_id:
          type: integer
        account_id:
          type: integer
        debit:
          $ref: '#/components/schemas/IDR'
        credit:
          $ref: '#/components/schemas/IDR'
        memo:
          type: string
        account_code:
          type: string
        account_name:
          type: string

    JournalEntry:
      type: object
      required: [id, entry_date, reference, description, lines]
      properties:
        id:
          type: integer
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        reference:
          type: string
          example: "JE-202605-0001"
        description:
          type: string
        source_type:
          type: string
          enum: ["", manual, income, expense, invoice, bill, credit_note]
        source_id:
          type: integer
          nullable: true
        is_posted:
          type: boolean
        created_by:
          type: integer
        created_by_name:
          type: string
        total_debit:
          $ref: '#/components/schemas/IDR'
        total_credit:
          $ref: '#/components/schemas/IDR'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLine'
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    JournalLineInput:
      type: object
      required: [account_id, debit, credit]
      properties:
        account_id:
          type: integer
        debit:
          $ref: '#/components/schemas/IDR'
        credit:
          $ref: '#/components/schemas/IDR'
        memo:
          type: string

    JournalInput:
      type: object
      required: [entry_date, description, lines]
      properties:
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        lines:
          type: array
          minItems: 2
          maxItems: 100
          items:
            $ref: '#/components/schemas/JournalLineInput'

    ContactInput:
      type: object
      required: [name, contact_type]
      properties:
        name:
          type: string
        contact_type:
          type: string
          enum: [customer, supplier, both]
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
          default: true

    InvoiceLine:
      type: object
      properties:
        id:
          type: integer
        invoice_id:
          type: integer
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        amount:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string

    InvoiceLineInput:
      type: object
      required: [description, quantity, unit_price, account_id]
      properties:
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoice_number:
          type: string
        contact_id:
          type: integer
        contact_name:
          type: string
        invoice_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        status:
          type: string
          enum: [draft, sent, partial, paid, overdue, cancelled]
        subtotal:
          $ref: '#/components/schemas/IDR'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        total:
          $ref: '#/components/schemas/IDR'
        amount_paid:
          $ref: '#/components/schemas/IDR'
        amount_credited:
          $ref: '#/components/schemas/IDR'
        amount_due:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        journal_id:
          type: integer
          nullable: true
        created_by:
          type: integer
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLine'

    InvoiceInput:
      type: object
      required: [contact_id, invoice_date, due_date, lines]
      properties:
        contact_id:
          type: integer
        invoice_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineInput'

    InvoicePaymentInput:
      type: object
      required: [amount, payment_date, payment_account]
      properties:
        amount:
          $ref: '#/components/schemas/IDR'
        payment_date:
          $ref: '#/components/schemas/BusinessDate'
        payment_account:
          type: integer
          description: Asset account ID receiving the payment.

    GenerateRecurringResult:
      type: object
      required: [created, skipped, failed, items]
      properties:
        created:
          type: integer
          description: Number of draft invoices created.
        skipped:
          type: integer
          description: Number of active customers skipped.
        failed:
          type: integer
          description: Number of customers whose invoice could not be created.
        items:
          type: array
          items:
            type: object
            required: [contact_id, contact_name, result]
            properties:
              contact_id:
                type: integer
              contact_name:
                type: string
              invoice_id:
                type: integer
                description: Present only when result is "created".
              invoice_number:
                type: string
                description: Present only when result is "created".
              result:
                type: string
                enum: [created, skipped_no_price, skipped_already_invoiced, failed]
              error:
                type: string
                description: Present only when result is "failed".

    BillLine:
      type: object
      properties:
        id:
          type: integer
        bill_id:
          type: integer
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        amount:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string

    BillLineInput:
      type: object
      required: [description, quantity, unit_price, account_id]
      properties:
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer

    Bill:
      type: object
      properties:
        id:
          type: integer
        bill_number:
          type: string
        contact_id:
          type: integer
        contact_name:
          type: string
        bill_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        status:
          type: string
          enum: [draft, received, partial, paid, cancelled]
        subtotal:
          $ref: '#/components/schemas/IDR'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        total:
          $ref: '#/components/schemas/IDR'
        amount_paid:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        journal_id:
          type: integer
          nullable: true
        created_by:
          type: integer
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/BillLine'

    BillInput:
      type: object
      required: [contact_id, bill_date, due_date, lines]
      properties:
        contact_id:
          type: integer
        bill_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/BillLineInput'

    BillPaymentInput:
      type: object
      required: [amount, payment_date, payment_account]
      properties:
        amount:
          $ref: '#/components/schemas/IDR'
        payment_date:
          $ref: '#/components/schemas/BusinessDate'
        payment_account:
          type: integer
          description: Asset account ID funding the payment.

    CreditNoteLine:
      type: object
      properties:
        id:
          type: integer
        credit_note_id:
          type: integer
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        amount:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string

    CreditNoteLineInput:
      type: object
      required: [description, quantity, unit_price, account_id]
      properties:
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer

    CreditNote:
      type: object
      properties:
        id:
          type: integer
        cn_number:
          type: string
        contact_id:
          type: integer
        contact_name:
          type: string
        invoice_id:
          type: integer
          nullable: true
        invoice_number:
          type: string
        cn_date:
          $ref: '#/components/schemas/BusinessDate'
        reason:
          type: string
          enum: [cancellation, return, discount, other]
        status:
          type: string
          enum: [draft, issued, void]
        subtotal:
          $ref: '#/components/schemas/IDR'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        total:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        journal_id:
          type: integer
          nullable: true
        created_by:
          type: integer
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/CreditNoteLine'

    CreditNoteInput:
      type: object
      required: [contact_id, cn_date, reason, lines]
      properties:
        contact_id:
          type: integer
        invoice_id:
          type: integer
          nullable: true
          description: Optional link to the original invoice.
        cn_date:
          $ref: '#/components/schemas/BusinessDate'
        reason:
          type: string
          enum: [cancellation, return, discount, other]
        tax_amount:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/CreditNoteLineInput'

    AccountRef:
      type: object
      description: Compact account reference embedded in income/expense responses.
      required: [id, code, name]
      properties:
        id:
          type: integer
        code:
          type: string
          example: "4-0001"
        name:
          type: string
          example: "School Bus Contract"

    IncomeEntry:
      type: object
      description: An income journal entry (source_type=income). Debit deposit account, credit revenue account.
      properties:
        id:
          type: integer
        reference:
          type: string
          example: "JE-202605-0001"
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        revenue_account:
          $ref: '#/components/schemas/AccountRef'
        deposit_account:
          $ref: '#/components/schemas/AccountRef'
        created_at:
          $ref: '#/components/schemas/Instant'

    IncomeInput:
      type: object
      required: [entry_date, description, amount, revenue_account, deposit_account]
      properties:
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        revenue_account:
          type: integer
          description: Account ID of the revenue account (type=revenue).
        deposit_account:
          type: integer
          description: Account ID of the deposit account (type=asset).

    ExpenseEntry:
      type: object
      description: An expense journal entry (source_type=expense). Debit expense account, credit payment account.
      properties:
        id:
          type: integer
        reference:
          type: string
          example: "JE-202605-0002"
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        expense_account:
          $ref: '#/components/schemas/AccountRef'
        payment_account:
          $ref: '#/components/schemas/AccountRef'
        created_at:
          $ref: '#/components/schemas/Instant'

    ExpenseInput:
      type: object
      required: [entry_date, description, amount, expense_account, payment_account]
      properties:
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        expense_account:
          type: integer
          description: Account ID of the expense account (type=expense).
        payment_account:
          type: integer
          description: Account ID of the payment account (type=asset).

    TrialBalanceRow:
      type: object
      properties:
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string
        account_type:
          type: string
        normal_balance:
          type: string
        total_debit:
          $ref: '#/components/schemas/IDR'
        total_credit:
          $ref: '#/components/schemas/IDR'
        balance:
          $ref: '#/components/schemas/IDR'

    TrialBalanceReport:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TrialBalanceRow'
        total_debit:
          $ref: '#/components/schemas/IDR'
        total_credit:
          $ref: '#/components/schemas/IDR'
        from:
          $ref: '#/components/schemas/BusinessDate'
        to:
          $ref: '#/components/schemas/BusinessDate'

    ProfitLossRow:
      type: object
      properties:
        account_code:
          type: string
        account_name:
          type: string
        account_type:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'

    ProfitLossReport:
      type: object
      properties:
        revenue:
          type: array
          items:
            $ref: '#/components/schemas/ProfitLossRow'
        expenses:
          type: array
          items:
            $ref: '#/components/schemas/ProfitLossRow'
        total_revenue:
          $ref: '#/components/schemas/IDR'
        total_expense:
          $ref: '#/components/schemas/IDR'
        net_income:
          $ref: '#/components/schemas/IDR'
        from:
          $ref: '#/components/schemas/BusinessDate'
        to:
          $ref: '#/components/schemas/BusinessDate'

    BalanceSheetRow:
      type: object
      properties:
        account_code:
          type: string
        account_name:
          type: string
        balance:
          $ref: '#/components/schemas/IDR'

    BalanceSheetSection:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/BalanceSheetRow'
        total:
          $ref: '#/components/schemas/IDR'

    BalanceSheetReport:
      type: object
      properties:
        assets:
          $ref: '#/components/schemas/BalanceSheetSection'
        liabilities:
          $ref: '#/components/schemas/BalanceSheetSection'
        equity:
          $ref: '#/components/schemas/BalanceSheetSection'
        retained_earnings:
          $ref: '#/components/schemas/IDR'
        total_liab_equity:
          $ref: '#/components/schemas/IDR'
        as_of:
          $ref: '#/components/schemas/BusinessDate'

    CashFlowRow:
      type: object
      properties:
        account_code:
          type: string
        account_name:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'

    CashFlowReport:
      type: object
      properties:
        operating:
          type: array
          items:
            $ref: '#/components/schemas/CashFlowRow'
        total_operating:
          $ref: '#/components/schemas/IDR'
        net_cash_change:
          $ref: '#/components/schemas/IDR'
        opening_cash:
          $ref: '#/components/schemas/IDR'
        closing_cash:
          $ref: '#/components/schemas/IDR'
        from:
          $ref: '#/components/schemas/BusinessDate'
        to:
          $ref: '#/components/schemas/BusinessDate'

    GeneralLedgerEntry:
      type: object
      properties:
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        reference:
          type: string
        description:
          type: string
        debit:
          $ref: '#/components/schemas/IDR'
        credit:
          $ref: '#/components/schemas/IDR'
        balance:
          $ref: '#/components/schemas/IDR'

    GeneralLedgerReport:
      type: object
      properties:
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/GeneralLedgerEntry'
        from:
          $ref: '#/components/schemas/BusinessDate'
        to:
          $ref: '#/components/schemas/BusinessDate'

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
        must_change_password:
          type: boolean
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    UserInput:
      type: object
      required: [username, full_name, role, password]
      properties:
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
          default: true
        password:
          type: string
          minLength: 4

    UserUpdateInput:
      type: object
      required: [full_name, role]
      properties:
        full_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
        password:
          type: string
          minLength: 4

    RoleSchema:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    RoleInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          pattern: '^[a-z][a-z0-9_-]*$'
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
          default: []

    RoleUpdateInput:
      type: object
      properties:
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
          default: []

    AuditEntry:
      type: object
      properties:
        id:
          type: integer
        occurred_at:
          $ref: '#/components/schemas/Instant'
        request_id:
          type: string
        actor_username:
          type: string
        action:
          type: string
        target_type:
          type: string
        target_label:
          type: string
        result:
          type: string
          enum: [ok, fail]
        error_message:
          type: string
        ip:
          type: string
        metadata:
          type: string

    RecentTransaction:
      type: object
      properties:
        id:
          type: integer
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        reference:
          type: string
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        source_type:
          type: string

    DashboardData:
      type: object
      properties:
        cash_balance:
          $ref: '#/components/schemas/IDR'
        monthly_revenue:
          $ref: '#/components/schemas/IDR'
        monthly_expenses:
          $ref: '#/components/schemas/IDR'
        outstanding_invoices:
          $ref: '#/components/schemas/IDR'
        outstanding_bills:
          $ref: '#/components/schemas/IDR'
        recent_transactions:
          type: array
          items:
            $ref: '#/components/schemas/RecentTransaction'

    APIToken:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        prefix:
          type: string
          description: First 8 chars of token (safe to display)
        scopes:
          type: array
          items:
            type: string
        expires_at:
          allOf:
            - $ref: '#/components/schemas/Instant'
          nullable: true
        last_used_at:
          allOf:
            - $ref: '#/components/schemas/Instant'
          nullable: true
        revoked_at:
          allOf:
            - $ref: '#/components/schemas/Instant'
          nullable: true
        created_at:
          $ref: '#/components/schemas/Instant'
    APITokenCreated:
      allOf:
        - $ref: '#/components/schemas/APIToken'
        - type: object
          properties:
            plaintext:
              type: string
              description: Full token value. Shown ONCE only. Store securely.
    APITokenInput:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
          description: Must be a subset of the requesting user's capabilities.
        expires_at:
          allOf:
            - $ref: '#/components/schemas/Instant'
          nullable: true
          description: Optional expiry. Null means no expiry.

  responses:
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflict (e.g., duplicate name, invalid state transition).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: List chart of accounts
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [asset, liability, equity, revenue, expense]
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated list of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAccount
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /accounts/{id}:
    get:

openapi: 3.1.0
info:
  title: Latasya ERP API
  version: 1.0.0
  description: |
    JSON API for Latasya ERP — a bookkeeping web app for Indonesian transport businesses.
    
    ## Authentication
    
    Two authentication methods are supported:
    
    - **Cookie + CSRF**: For browser clients. Session cookie `session_id` + `X-CSRF-Token` header.
    - **Bearer Token**: For bots, MCP servers, Telegram integrations. `Authorization: Bearer lat_<token>`.
      Bearer tokens are scoped (subset of user capabilities) and revocable.
      Bearer requests skip CSRF validation.
    
    ## Money & Quantities
    
    - **Currency (IDR)**: All monetary amounts are strings representing integer IDR values.
      Example: `"50000"` = Rp 50.000. No decimals, no subunits.
    - **Quantities**: Decimal strings with up to 2 decimal places.
      Example: `"1.50"` = 1.5 units (stored internally as integer × 100).
    
    ## Pagination
    
    List endpoints return: `{"data": [...], "meta": {"page": 1, "per_page": 50, "total": 100, "total_pages": 2}}`
    
    Query params: `?page=1&per_page=50` (default 50, max 200).
    
    ## Errors
    
    All errors return: `{"error": "message", "code": "snake_case_code", "request_id": "...", "fields": {...}}`
    
    Common codes: `unauthorized`, `forbidden`, `not_found`, `validation_failed`, `conflict`, `rate_limited`, `invalid_token`.

servers:
  - url: /api/v1
    description: Latasya ERP API v1

security:
  - BearerAuth: []
  - CookieAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token created via /settings/api-tokens or POST /api/v1/api-tokens.
        Format: `lat_<32-base62-chars>`. Scoped to a subset of user capabilities.
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Session cookie set on login. Requires X-CSRF-Token header for state-changing requests.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: |
        Unique key for idempotent requests. If the same key is used within 24 hours,
        the original response is replayed without re-executing the operation.
        Required for financial mutations (invoices, bills, journals, credit-notes).
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  schemas:
    IDR:
      type: string
      pattern: '^-?[0-9]+$'
      description: |
        Indonesian Rupiah amount as integer-valued string.
        Example: "50000" = Rp 50.000. No decimals, no subunits.
      example: "50000"

    Quantity:
      type: string
      pattern: '^[0-9]+(\.[0-9]{1,2})?$'
      description: |
        Quantity as decimal string with up to 2 decimal places.
        Stored internally as integer × 100.
        Example: "1.50" = 1.5 units.
      example: "1.50"

    BusinessDate:
      type: string
      format: date
      description: Business date in YYYY-MM-DD format (Asia/Jakarta timezone context).
      example: "2026-05-10"

    Instant:
      type: string
      format: date-time
      description: UTC timestamp in ISO-8601 format.
      example: "2026-05-10T03:00:00Z"

    User:
      type: object
      required: [id, username, full_name, role, capabilities, must_change_password]
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        must_change_password:
          type: boolean

    AuthMe:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [auth_method]
          properties:
            auth_method:
              type: string
              enum: [bearer, cookie]
            token_id:
              type: integer
              nullable: true

    Account:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        normal_balance:
          type: string
          enum: [debit, credit]
        description:
          type: string
        is_active:
          type: boolean
        is_system:
          type: boolean
        parent_id:
          type: integer
          nullable: true
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    AccountInput:
      type: object
      required: [code, name, account_type, normal_balance]
      properties:
        code:
          type: string
        name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        normal_balance:
          type: string
          enum: [debit, credit]
        description:
          type: string
        is_active:
          type: boolean
          default: true

    Meta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 50
        total:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 2

    ErrorEnvelope:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: "not authenticated"
        code:
          type: string
          description: Machine-readable error code.
          enum:
            - invalid_request
            - validation_failed
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - rate_limited
            - invalid_token
            - password_change_required
            - idempotency_conflict
            - internal_error
          example: "unauthorized"
        request_id:
          type: string
          description: Request ID for tracing (from audit middleware).
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
        fields:
          type: object
          additionalProperties:
            type: string
          description: Field-level validation errors (only present for validation_failed).
          example:
            contact_id: "required"
            amount: "must be positive"

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contact_type:
          type: string
          enum: [customer, supplier, both]
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    JournalLine:
      type: object
      required: [account_id, debit, credit]
      properties:
        id:
          type: integer
        entry_id:
          type: integer
        account_id:
          type: integer
        debit:
          $ref: '#/components/schemas/IDR'
        credit:
          $ref: '#/components/schemas/IDR'
        memo:
          type: string
        account_code:
          type: string
        account_name:
          type: string

    JournalEntry:
      type: object
      required: [id, entry_date, reference, description, lines]
      properties:
        id:
          type: integer
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        reference:
          type: string
          example: "JE-202605-0001"
        description:
          type: string
        source_type:
          type: string
          enum: ["", manual, income, expense, invoice, bill, credit_note]
        source_id:
          type: integer
          nullable: true
        is_posted:
          type: boolean
        created_by:
          type: integer
        created_by_name:
          type: string
        total_debit:
          $ref: '#/components/schemas/IDR'
        total_credit:
          $ref: '#/components/schemas/IDR'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLine'
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    JournalLineInput:
      type: object
      required: [account_id, debit, credit]
      properties:
        account_id:
          type: integer
        debit:
          $ref: '#/components/schemas/IDR'
        credit:
          $ref: '#/components/schemas/IDR'
        memo:
          type: string

    JournalInput:
      type: object
      required: [entry_date, description, lines]
      properties:
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        lines:
          type: array
          minItems: 2
          maxItems: 100
          items:
            $ref: '#/components/schemas/JournalLineInput'

    ContactInput:
      type: object
      required: [name, contact_type]
      properties:
        name:
          type: string
        contact_type:
          type: string
          enum: [customer, supplier, both]
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
          default: true

    InvoiceLine:
      type: object
      properties:
        id:
          type: integer
        invoice_id:
          type: integer
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        amount:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string

    InvoiceLineInput:
      type: object
      required: [description, quantity, unit_price, account_id]
      properties:
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoice_number:
          type: string
        contact_id:
          type: integer
        contact_name:
          type: string
        invoice_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        status:
          type: string
          enum: [draft, sent, partial, paid, overdue, cancelled]
        subtotal:
          $ref: '#/components/schemas/IDR'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        total:
          $ref: '#/components/schemas/IDR'
        amount_paid:
          $ref: '#/components/schemas/IDR'
        amount_credited:
          $ref: '#/components/schemas/IDR'
        amount_due:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        journal_id:
          type: integer
          nullable: true
        created_by:
          type: integer
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLine'

    InvoiceInput:
      type: object
      required: [contact_id, invoice_date, due_date, lines]
      properties:
        contact_id:
          type: integer
        invoice_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineInput'

    InvoicePaymentInput:
      type: object
      required: [amount, payment_date, payment_account]
      properties:
        amount:
          $ref: '#/components/schemas/IDR'
        payment_date:
          $ref: '#/components/schemas/BusinessDate'
        payment_account:
          type: integer
          description: Asset account ID receiving the payment.

    BillLine:
      type: object
      properties:
        id:
          type: integer
        bill_id:
          type: integer
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        amount:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string

    BillLineInput:
      type: object
      required: [description, quantity, unit_price, account_id]
      properties:
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer

    Bill:
      type: object
      properties:
        id:
          type: integer
        bill_number:
          type: string
        contact_id:
          type: integer
        contact_name:
          type: string
        bill_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        status:
          type: string
          enum: [draft, received, partial, paid, cancelled]
        subtotal:
          $ref: '#/components/schemas/IDR'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        total:
          $ref: '#/components/schemas/IDR'
        amount_paid:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        journal_id:
          type: integer
          nullable: true
        created_by:
          type: integer
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/BillLine'

    BillInput:
      type: object
      required: [contact_id, bill_date, due_date, lines]
      properties:
        contact_id:
          type: integer
        bill_date:
          $ref: '#/components/schemas/BusinessDate'
        due_date:
          $ref: '#/components/schemas/BusinessDate'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/BillLineInput'

    BillPaymentInput:
      type: object
      required: [amount, payment_date, payment_account]
      properties:
        amount:
          $ref: '#/components/schemas/IDR'
        payment_date:
          $ref: '#/components/schemas/BusinessDate'
        payment_account:
          type: integer
          description: Asset account ID funding the payment.

    CreditNoteLine:
      type: object
      properties:
        id:
          type: integer
        credit_note_id:
          type: integer
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        amount:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer
        account_code:
          type: string
        account_name:
          type: string

    CreditNoteLineInput:
      type: object
      required: [description, quantity, unit_price, account_id]
      properties:
        description:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
        unit_price:
          $ref: '#/components/schemas/IDR'
        account_id:
          type: integer

    CreditNote:
      type: object
      properties:
        id:
          type: integer
        cn_number:
          type: string
        contact_id:
          type: integer
        contact_name:
          type: string
        invoice_id:
          type: integer
          nullable: true
        invoice_number:
          type: string
        cn_date:
          $ref: '#/components/schemas/BusinessDate'
        reason:
          type: string
          enum: [cancellation, return, discount, other]
        status:
          type: string
          enum: [draft, issued, void]
        subtotal:
          $ref: '#/components/schemas/IDR'
        tax_amount:
          $ref: '#/components/schemas/IDR'
        total:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        journal_id:
          type: integer
          nullable: true
        created_by:
          type: integer
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/CreditNoteLine'

    CreditNoteInput:
      type: object
      required: [contact_id, cn_date, reason, lines]
      properties:
        contact_id:
          type: integer
        invoice_id:
          type: integer
          nullable: true
          description: Optional link to the original invoice.
        cn_date:
          $ref: '#/components/schemas/BusinessDate'
        reason:
          type: string
          enum: [cancellation, return, discount, other]
        tax_amount:
          $ref: '#/components/schemas/IDR'
        notes:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/CreditNoteLineInput'

    AccountRef:
      type: object
      description: Compact account reference embedded in income/expense responses.
      required: [id, code, name]
      properties:
        id:
          type: integer
        code:
          type: string
          example: "4-0001"
        name:
          type: string
          example: "School Bus Contract"

    IncomeEntry:
      type: object
      description: An income journal entry (source_type=income). Debit deposit account, credit revenue account.
      properties:
        id:
          type: integer
        reference:
          type: string
          example: "JE-202605-0001"
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        revenue_account:
          $ref: '#/components/schemas/AccountRef'
        deposit_account:
          $ref: '#/components/schemas/AccountRef'
        created_at:
          $ref: '#/components/schemas/Instant'

    IncomeInput:
      type: object
      required: [entry_date, description, amount, revenue_account, deposit_account]
      properties:
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        revenue_account:
          type: integer
          description: Account ID of the revenue account (type=revenue).
        deposit_account:
          type: integer
          description: Account ID of the deposit account (type=asset).

    ExpenseEntry:
      type: object
      description: An expense journal entry (source_type=expense). Debit expense account, credit payment account.
      properties:
        id:
          type: integer
        reference:
          type: string
          example: "JE-202605-0002"
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        expense_account:
          $ref: '#/components/schemas/AccountRef'
        payment_account:
          $ref: '#/components/schemas/AccountRef'
        created_at:
          $ref: '#/components/schemas/Instant'

    ExpenseInput:
      type: object
      required: [entry_date, description, amount, expense_account, payment_account]
      properties:
        entry_date:
          $ref: '#/components/schemas/BusinessDate'
        description:
          type: string
        amount:
          $ref: '#/components/schemas/IDR'
        expense_account:
          type: integer
          description: Account ID of the expense account (type=expense).
        payment_account:
          type: integer
          description: Account ID of the payment account (type=asset).

  responses:
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflict (e.g., duplicate name, invalid state transition).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: List chart of accounts
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [asset, liability, equity, revenue, expense]
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated list of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAccount
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /accounts/{id}:
    get:
      operationId: getAccount
      summary: Get a single account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAccount
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      operationId: deleteAccount
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Account deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: Get OpenAPI specification
      description: Returns the raw OpenAPI 3.1 YAML specification.
      security: []
      responses:
        '200':
          description: OpenAPI YAML specification.
          content:
            application/yaml:
              schema:
                type: string

  /auth/login:
    post:
      operationId: login
      summary: Authenticate and create a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [user, csrf_token]
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      csrf_token:
                        type: string

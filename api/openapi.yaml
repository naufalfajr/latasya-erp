        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/csrf:
    get:
      operationId: getCSRFToken
      summary: Get CSRF token for cookie-authenticated requests
      security:
        - CookieAuth: []
      responses:
        '200':
          description: CSRF token bound to the current session.
          content:
            application/json:
              schema:
                type: object
                required: [csrf_token]
                properties:
                  csrf_token:
                    type: string
        '400':
          description: Not applicable for bearer-authenticated callers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'


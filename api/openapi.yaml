openapi: 3.1.0
info:
  title: Latasya ERP API
  version: 1.0.0
  description: |
    JSON API for Latasya ERP — a bookkeeping web app for Indonesian transport businesses.
    
    ## Authentication
    
    Two authentication methods are supported:
    
    - **Cookie + CSRF**: For browser clients. Session cookie `session_id` + `X-CSRF-Token` header.
    - **Bearer Token**: For bots, MCP servers, Telegram integrations. `Authorization: Bearer lat_<token>`.
      Bearer tokens are scoped (subset of user capabilities) and revocable.
      Bearer requests skip CSRF validation.
    
    ## Money & Quantities
    
    - **Currency (IDR)**: All monetary amounts are strings representing integer IDR values.
      Example: `"50000"` = Rp 50.000. No decimals, no subunits.
    - **Quantities**: Decimal strings with up to 2 decimal places.
      Example: `"1.50"` = 1.5 units (stored internally as integer × 100).
    
    ## Pagination
    
    List endpoints return: `{"data": [...], "meta": {"page": 1, "per_page": 50, "total": 100, "total_pages": 2}}`
    
    Query params: `?page=1&per_page=50` (default 50, max 200).
    
    ## Errors
    
    All errors return: `{"error": "message", "code": "snake_case_code", "request_id": "...", "fields": {...}}`
    
    Common codes: `unauthorized`, `forbidden`, `not_found`, `validation_failed`, `conflict`, `rate_limited`, `invalid_token`.

servers:
  - url: /api/v1
    description: Latasya ERP API v1

security:
  - BearerAuth: []
  - CookieAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token created via /settings/api-tokens or POST /api/v1/api-tokens.
        Format: `lat_<32-base62-chars>`. Scoped to a subset of user capabilities.
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Session cookie set on login. Requires X-CSRF-Token header for state-changing requests.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: |
        Unique key for idempotent requests. If the same key is used within 24 hours,
        the original response is replayed without re-executing the operation.
        Required for financial mutations (invoices, bills, journals, credit-notes).
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  schemas:
    IDR:
      type: string
      pattern: '^-?[0-9]+$'
      description: |
        Indonesian Rupiah amount as integer-valued string.
        Example: "50000" = Rp 50.000. No decimals, no subunits.
      example: "50000"

    Quantity:
      type: string
      pattern: '^[0-9]+(\.[0-9]{1,2})?$'
      description: |
        Quantity as decimal string with up to 2 decimal places.
        Stored internally as integer × 100.
        Example: "1.50" = 1.5 units.
      example: "1.50"

    BusinessDate:
      type: string
      format: date
      description: Business date in YYYY-MM-DD format (Asia/Jakarta timezone context).
      example: "2026-05-10"

    Instant:
      type: string
      format: date-time
      description: UTC timestamp in ISO-8601 format.
      example: "2026-05-10T03:00:00Z"

    User:
      type: object
      required: [id, username, full_name, role, capabilities, must_change_password]
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        must_change_password:
          type: boolean

    AuthMe:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [auth_method]
          properties:
            auth_method:
              type: string
              enum: [bearer, cookie]
            token_id:
              type: integer
              nullable: true

    Account:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        normal_balance:
          type: string
          enum: [debit, credit]
        description:
          type: string
        is_active:
          type: boolean
        is_system:
          type: boolean
        parent_id:
          type: integer
          nullable: true
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    AccountInput:
      type: object
      required: [code, name, account_type, normal_balance]
      properties:
        code:
          type: string
        name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        normal_balance:
          type: string
          enum: [debit, credit]
        description:
          type: string
        is_active:
          type: boolean
          default: true

    Meta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 50
        total:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 2

    ErrorEnvelope:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: "not authenticated"
        code:
          type: string
          description: Machine-readable error code.
          enum:
            - invalid_request
            - validation_failed
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - rate_limited
            - invalid_token
            - password_change_required
            - idempotency_conflict
            - internal_error
          example: "unauthorized"
        request_id:
          type: string
          description: Request ID for tracing (from audit middleware).
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
        fields:
          type: object
          additionalProperties:
            type: string
          description: Field-level validation errors (only present for validation_failed).
          example:
            contact_id: "required"
            amount: "must be positive"

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contact_type:
          type: string
          enum: [customer, supplier, both]
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/Instant'
        updated_at:
          $ref: '#/components/schemas/Instant'

    ContactInput:
      type: object
      required: [name, contact_type]
      properties:
        name:
          type: string
        contact_type:
          type: string
          enum: [customer, supplier, both]
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
          default: true

  responses:
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflict (e.g., duplicate name, invalid state transition).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: List chart of accounts
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [asset, liability, equity, revenue, expense]
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated list of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAccount
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /accounts/{id}:
    get:
      operationId: getAccount
      summary: Get a single account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAccount
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      operationId: deleteAccount
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Account deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: Get OpenAPI specification
      description: Returns the raw OpenAPI 3.1 YAML specification.
      security: []
      responses:
        '200':
          description: OpenAPI YAML specification.
          content:
            application/yaml:
              schema:
                type: string

  /auth/login:
    post:
      operationId: login
      summary: Authenticate and create a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [user, csrf_token]
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      csrf_token:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      operationId: logout
      summary: Destroy the current session
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: getMe
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AuthMe'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/csrf:
    get:
      operationId: getCSRFToken
      summary: Get CSRF token for cookie-authenticated requests
      security:
        - CookieAuth: []
      responses:
        '200':
          description: CSRF token bound to the current session.
          content:
            application/json:
              schema:
                type: object
                required: [csrf_token]
                properties:
                  csrf_token:
                    type: string
        '400':
          description: Not applicable for bearer-authenticated callers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password/change:
    post:
      operationId: changePassword
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password, confirm_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 8
                confirm_password:
                  type: string
                  format: password
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /contacts:
    get:
      operationId: listContacts
      summary: List contacts
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: type
          in: query
          schema:
            type: string
            enum: [customer, supplier, both]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of contacts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createContact
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInput'
      responses:
        '201':
          description: Contact created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /contacts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getContact
      summary: Get a contact
      responses:
        '200':
          description: Contact object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateContact
      summary: Update a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInput'
      responses:
        '200':
          description: Updated contact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      operationId: deleteContact
      summary: Delete a contact
      responses:
        '204':
          description: Contact deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

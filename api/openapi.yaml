  /invoices/generate-recurring:
    parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: generateRecurringInvoices
      summary: Generate draft invoices for all active customers
      description: |
        Creates a draft invoice for every active customer by cloning the line
        items and tax of that customer's most recent invoice. Invoice date is
        today; due date is today + 10 days. Customers already invoiced in the
        current month, or with no prior invoice to clone, are skipped.
        Requires invoices.manage.
      responses:
        '200':
          description: Batch result summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GenerateRecurringResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /invoices/bulk-delete:
    post:
      operationId: bulkDeleteInvoices
      summary: Bulk-delete draft invoices
      description: |
        Deletes the draft invoices among the provided IDs. IDs that are unknown
        or not in draft status are skipped and returned. Requires invoices.manage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  minItems: 1
      responses:
        '200':
          description: Bulk delete result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [deleted, deleted_invoices, skipped]
                    properties:
                      deleted:
                        type: integer
                        description: Number of draft invoices deleted.
                      deleted_invoices:
                        type: array
                        description: The invoices that were deleted (id + number).
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            invoice_number:
                              type: string
                      skipped:
                        type: array
                        items:
                          type: integer
                        description: IDs skipped (unknown or not draft).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /invoices/bulk-send:
    post:
      operationId: bulkSendInvoices
      summary: Bulk-send draft invoices
      description: |
        Marks the draft invoices among the provided IDs as sent, posting each
        one's AR journal entry. IDs that are unknown or not in draft status are
        skipped; a send failure is reported under failed. Requires invoices.manage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  minItems: 1
      responses:
        '200':
          description: Bulk send result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [sent, sent_invoices, skipped, failed]
                    properties:
                      sent:
                        type: integer
                        description: Number of invoices sent.
                      sent_invoices:
                        type: array
                        description: The invoices that were sent (id, number, posted journal id).
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            invoice_number:
                              type: string
                            journal_id:
                              type: integer
                              nullable: true
                      skipped:
                        type: array
                        items:
                          type: integer
                        description: IDs skipped (unknown or not draft).
                      failed:
                        type: array
                        description: Invoices whose send failed, with the reason.
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            invoice_number:
                              type: string
                            error:
                              type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'

